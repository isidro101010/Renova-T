<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Sistema de Facturación Inteligente</title>

  <!-- GOOGLE FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <!-- LIBRERÍAS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>

    :root{

      --bg:#0f172a;
      --card:#111827;
      --card2:#1e293b;

      --border:rgba(255,255,255,.08);

      --text:#f8fafc;
      --muted:#94a3b8;

      --primary:#3b82f6;
      --primary-hover:#2563eb;

      --success:#22c55e;
      --danger:#ef4444;

      --shadow:0 10px 30px rgba(0,0,0,.35);

    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:"Inter",sans-serif;

      background:
      radial-gradient(circle at top left, rgba(59,130,246,.15), transparent 25%),
      radial-gradient(circle at bottom right, rgba(34,197,94,.10), transparent 20%),
      var(--bg);

      color:var(--text);

      min-height:100vh;

    }

    header{
      padding:25px;
    }

    .header-container{

      max-width:1600px;

      margin:auto;

      background:rgba(17,24,39,.75);

      backdrop-filter:blur(14px);

      border:1px solid var(--border);

      border-radius:24px;

      padding:24px 28px;

      display:flex;

      justify-content:space-between;

      align-items:center;

      gap:20px;

      box-shadow:var(--shadow);

    }

    .brand h1{
      font-size:2rem;
      font-weight:800;
    }

    .brand p{
      color:var(--muted);
      margin-top:5px;
    }

    .excel-btn{

      background:var(--success);

      color:white;

      border:none;

      padding:14px 22px;

      border-radius:14px;

      font-weight:700;

      cursor:pointer;

    }

    .excel-btn:hover{
      filter:brightness(1.05);
    }

    main{

      max-width:1600px;

      margin:auto;

      padding:0 25px 40px;

    }

    .card{

      background:rgba(17,24,39,.75);

      backdrop-filter:blur(14px);

      border:1px solid var(--border);

      border-radius:24px;

      padding:24px;

      box-shadow:var(--shadow);

    }

    .top-section{

      display:flex;

      justify-content:space-between;

      align-items:center;

      flex-wrap:wrap;

      gap:20px;

      margin-bottom:25px;

    }

    form{

      display:flex;

      flex-wrap:wrap;

      gap:15px;

      margin-bottom:25px;

    }

    input[type="file"],
    input[type="text"]{

      flex:1;

      min-width:250px;

      background:#0f172a;

      color:var(--text);

      border:1px solid var(--border);

      border-radius:14px;

      padding:14px;

    }

    .upload-btn{

      background:var(--primary);

      color:white;

      padding:14px 22px;

      border:none;

      border-radius:14px;

      font-weight:700;

      cursor:pointer;

    }

    .upload-btn:hover{
      background:var(--primary-hover);
    }

    .table-container{

      overflow:auto;

      border-radius:18px;

      border:1px solid var(--border);

    }

    table{

      width:100%;

      min-width:2500px;

      border-collapse:collapse;

      background:rgba(15,23,42,.9);

    }

    thead{
      background:#172554;
    }

    th{

      padding:14px 10px;

      font-size:.82rem;

      text-transform:uppercase;

      border-bottom:1px solid var(--border);

    }

    td{

      padding:12px 10px;

      text-align:center;

      font-size:.85rem;

      border-bottom:1px solid rgba(255,255,255,.05);

      color:#e2e8f0;

    }

    tbody tr:nth-child(even){
      background:rgba(255,255,255,.02);
    }

    tbody tr:hover{
      background:rgba(59,130,246,.08);
    }

    .delete-btn{

      background:rgba(239,68,68,.15);

      color:#fecaca;

      border:1px solid rgba(239,68,68,.2);

      padding:8px 12px;

      border-radius:10px;

      cursor:pointer;

    }

    .file-badge{

      display:inline-block;

      font-size:0.7rem;

      padding:3px 7px;

      border-radius:5px;

      font-weight:600;

    }

    .badge-xml{
      background:rgba(59,130,246,.15);
      color:#a3bfff;
    }

    .badge-pdf{
      background:rgba(239,68,68,.15);
      color:#fca5a5;
    }

    .badge-ocr{
      background:rgba(245,158,11,.15);
      color:#fcd34d;
    }

    footer{

      text-align:center;

      color:var(--muted);

      padding:30px;

    }

    .loading{

      position:fixed;

      inset:0;

      background:rgba(0,0,0,.65);

      backdrop-filter:blur(6px);

      display:none;

      align-items:center;

      justify-content:center;

      z-index:999;

    }

    .loading-box{

      background:var(--card);

      padding:30px 40px;

      border-radius:20px;

      text-align:center;

    }

    .spinner{

      width:55px;
      height:55px;

      border:5px solid rgba(255,255,255,.15);

      border-top:5px solid var(--primary);

      border-radius:50%;

      margin:auto auto 15px;

      animation:spin 1s linear infinite;

    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

  </style>

</head>

<body>

  <div class="loading" id="loading">

    <div class="loading-box">

      <div class="spinner"></div>

      <p>Procesando factura...</p>

    </div>

  </div>

  <header>

    <div class="header-container">

      <div class="brand">

        <h1>💳 Sistema de Facturación Inteligente</h1>

        <p>Procesamiento XML + PDF + OCR</p>

      </div>

      <button
        class="excel-btn"
        onclick="exportToExcel()"
      >
        Exportar Excel
      </button>

    </div>

  </header>

  <main>

    <div class="card">

      <div class="top-section">

        <h2>Facturas</h2>

        <div id="factura-count">
          Facturas leídas: 0
        </div>

      </div>

      <form id="upload-form">

        <input
          type="file"
          id="file-upload"
          accept=".xml, image/*, application/pdf"
        >

        <input
          type="text"
          id="search-bar"
          placeholder="Buscar factura..."
        >

        <button
          type="submit"
          class="upload-btn"
        >
          Subir Factura
        </button>

      </form>

      <div class="table-container">

        <table>

          <thead>

            <tr>

              <th>Tipo</th>
              <th>Factura</th>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>RUC</th>
              <th>Código</th>
              <th>Modelo</th>
              <th>Cantidad</th>
              <th>Precio Unitario</th>
              <th>Precio Total</th>
              <th>IVA</th>
              <th>Total</th>
              <th>Eliminar</th>

            </tr>

          </thead>

          <tbody id="invoice-table"></tbody>

        </table>

      </div>

    </div>

  </main>

  <footer>

    Sistema de Facturación Inteligente

  </footer>

  <script>

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let invoices =
      JSON.parse(localStorage.getItem("invoices"))
      || [];

    const loading =
      document.getElementById("loading");

    function showLoading(){
      loading.style.display = "flex";
    }

    function hideLoading(){
      loading.style.display = "none";
    }

    // =========================
    // SUBIR ARCHIVOS
    // =========================

    document
    .getElementById("upload-form")
    .addEventListener("submit", async (e)=>{

      e.preventDefault();

      const file =
        document.getElementById("file-upload")
        .files[0];

      if(!file){
        return alert("Selecciona un archivo.");
      }

      showLoading();

      try{

        // XML
        if(file.name.toLowerCase().endsWith(".xml")){

          const reader =
            new FileReader();

          reader.onload = function(){

            try{

              const parser =
                new DOMParser();

              const xml =
                parser.parseFromString(
                  this.result,
                  "application/xml"
                );

              const invoice =
                processXMLData(xml);

              invoices.push(...invoice);

              saveAndRender();

            }catch(err){

              alert("Error leyendo XML");

            }

            hideLoading();

          };

          reader.readAsText(file);

        }

        // PDF
        else if(file.name.toLowerCase().endsWith(".pdf")){

          const invoice =
            await processPDFData(file);

          invoices.push(...invoice);

          saveAndRender();

          hideLoading();

        }

        // OCR IMAGEN
        else{

          const {
            data:{ text }
          } = await Tesseract.recognize(
            file,
            "spa"
          );

          const invoice =
            extractFromText(text);

          invoices.push(invoice);

          saveAndRender();

          hideLoading();

        }

      }catch(err){

        console.error(err);

        alert("Error procesando archivo.");

        hideLoading();

      }

    });

    // =========================
    // XML
    // =========================

    function processXMLData(xml){

      const get = (sel)=>
        xml.querySelector(sel)
        ?.textContent
        ?.trim()
        || "N/A";

      const models =
        Array.from(
          xml.querySelectorAll(
            "detalle"
          )
        );

      return models.map(m=>({

        tipo:"XML",

        factura:
          get("secuencial"),

        fecha:
          get("fechaEmision"),

        cliente:
          get("razonSocialComprador"),

        ruc:
          get("identificacionComprador"),

        codigo:
          m.querySelector("codigoPrincipal")
          ?.textContent
          ?.trim()
          || "N/A",

        modelo:
          m.querySelector("descripcion")
          ?.textContent
          ?.trim()
          || "N/A",

        cantidad:
          m.querySelector("cantidad")
          ?.textContent
          ?.trim()
          || "1",

        precio_unitario:
          m.querySelector("precioUnitario")
          ?.textContent
          ?.trim()
          || "0",

        precio_total:
          m.querySelector("precioTotalSinImpuesto")
          ?.textContent
          ?.trim()
          || "0",

        iva:
          get("valor"),

        total:
          get("importeTotal")

      }));

    }

    // =========================
    // PDF MEJORADO
    // =========================

    async function processPDFData(file){

      const arrayBuffer =
        await file.arrayBuffer();

      const pdf =
        await pdfjsLib
        .getDocument(arrayBuffer)
        .promise;

      let lines = [];

      for(let p = 1; p <= pdf.numPages; p++){

        const page =
          await pdf.getPage(p);

        const content =
          await page.getTextContent();

        let lastY = null;

        let currentLine = "";

        content.items.forEach(item=>{

          const y =
            item.transform[5];

          if(
            lastY !== null &&
            Math.abs(y - lastY) > 4
          ){

            if(currentLine.trim()){
              lines.push(currentLine.trim());
            }

            currentLine = "";

          }

          currentLine += item.str + " ";

          lastY = y;

        });

        if(currentLine.trim()){
          lines.push(currentLine.trim());
        }

      }

      const fullText =
        lines.join("\n");

      const factura =
        fullText.match(
          /(?:FACTURA|No\.?)\s*[:#]?\s*([0-9\-]+)/i
        )?.[1]
        || "N/A";

      const cliente =
        fullText.match(
          /(?:Cliente|Raz[oó]n Social)[:\s]*(.+)/i
        )?.[1]
        ?.trim()
        || "N/A";

      const ruc =
        fullText.match(
          /RUC[:\s]*([0-9]{10,13})/i
        )?.[1]
        || "N/A";

      const fecha =
        fullText.match(
          /(\d{2}\/\d{2}\/\d{4})/
        )?.[1]
        || "N/A";

      const iva =
        fullText.match(
          /IVA(?:\s\d+%)?[:\s\$]*([\d.,]+)/i
        )?.[1]
        || "0";

      const total =
        fullText.match(
          /(?:TOTAL|VALOR TOTAL|A PAGAR)[:\s\$]*([\d.,]+)/i
        )?.[1]
        || "0";

      const productos = [];

      lines.forEach(line=>{

        const clean =
          line.replace(/\s+/g," ").trim();

        const match =
          clean.match(
            /^([A-Z0-9\-_]{2,})\s+(.+?)\s+(\d+)\s+([\d.,]+)\s+([\d.,]+)$/
          );

        if(match){

          productos.push({

            codigo:match[1],

            modelo:match[2],

            cantidad:match[3],

            precio_unitario:match[4],

            precio_total:match[5]

          });

        }

      });

      if(productos.length === 0){

        productos.push({

          codigo:"N/A",

          modelo:"Producto detectado",

          cantidad:"1",

          precio_unitario:total,

          precio_total:total

        });

      }

      return productos.map(prod=>({

        tipo:"PDF",

        factura,

        fecha,

        cliente,

        ruc,

        codigo:prod.codigo,

        modelo:prod.modelo,

        cantidad:prod.cantidad,

        precio_unitario:prod.precio_unitario,

        precio_total:prod.precio_total,

        iva,

        total

      }));

    }

    // =========================
    // OCR
    // =========================

    function extractFromText(text){

      return {

        tipo:"OCR",

        factura:
          text.match(
            /Factura\s*No[:.\s]*([A-Z0-9\-]+)/i
          )?.[1]
          || "N/A",

        fecha:
          text.match(
            /(\d{2}\/\d{2}\/\d{4})/
          )?.[1]
          || "N/A",

        cliente:
          text.match(
            /Cliente[:.\s]*(.+)/i
          )?.[1]
          || "N/A",

        ruc:
          text.match(
            /RUC[:.\s]*(\d{10,13})/i
          )?.[1]
          || "N/A",

        codigo:"-",

        modelo:"Detectado OCR",

        cantidad:"1",

        precio_unitario:"0",

        precio_total:"0",

        iva:"0",

        total:"0"

      };

    }

    // =========================
    // GUARDAR
    // =========================

    function saveAndRender(){

      localStorage.setItem(
        "invoices",
        JSON.stringify(invoices)
      );

      populateTable();

      updateFacturaCount();

    }

    function getBadgeClass(type){

      if(type === "XML"){
        return "badge-xml";
      }

      if(type === "PDF"){
        return "badge-pdf";
      }

      return "badge-ocr";

    }

    // =========================
    // TABLA
    // =========================

    function populateTable(data = invoices){

      const tbody =
        document.getElementById("invoice-table");

      tbody.innerHTML = "";

      data.forEach((inv,index)=>{

        const row =
          document.createElement("tr");

        Object.entries(inv).forEach(([key,value])=>{

          const td =
            document.createElement("td");

          if(key === "tipo"){

            td.innerHTML =
            `<span class="file-badge ${getBadgeClass(value)}">${value}</span>`;

          }else{

            td.textContent = value;

          }

          row.appendChild(td);

        });

        const del =
          document.createElement("button");

        del.textContent = "Eliminar";

        del.className = "delete-btn";

        del.onclick = ()=>{

          invoices.splice(index,1);

          saveAndRender();

        };

        const td =
          document.createElement("td");

        td.appendChild(del);

        row.appendChild(td);

        tbody.appendChild(row);

      });

    }

    // =========================
    // CONTADOR
    // =========================

    function updateFacturaCount(){

      document.getElementById(
        "factura-count"
      ).textContent =
      `Facturas leídas: ${invoices.length}`;

    }

    // =========================
    // EXPORTAR EXCEL
    // =========================

    function exportToExcel(){

      const ws =
        XLSX.utils.json_to_sheet(invoices);

      const wb =
        XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Facturas"
      );

      XLSX.writeFile(
        wb,
        "facturas.xlsx"
      );

    }

    // =========================
    // BUSCADOR
    // =========================

    document
    .getElementById("search-bar")
    .addEventListener("input",(e)=>{

      const term =
        e.target.value.toLowerCase();

      const filtered =
        invoices.filter(inv=>

          Object.values(inv)
          .join(" ")
          .toLowerCase()
          .includes(term)

        );

      populateTable(filtered);

    });

    document.addEventListener(
      "DOMContentLoaded",
      ()=>{

        populateTable();

        updateFacturaCount();

      }
    );

  </script>

</body>
</html>
