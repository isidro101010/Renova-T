<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Renova • Sistema de Facturación</title>

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Librerías -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    :root{
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1e293b;
      --border: rgba(255,255,255,.08);
      --text: #f8fafc;
      --muted: #94a3b8;

      --primary: #3b82f6;
      --primary-hover: #2563eb;

      --success: #22c55e;
      --danger: #ef4444;

      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Inter", sans-serif;
      background:
      radial-gradient(circle at top left, rgba(59,130,246,.15), transparent 25%),
      radial-gradient(circle at bottom right, rgba(34,197,94,.12), transparent 20%),
      var(--bg);

      color:var(--text);
      min-height:100vh;
    }

    header{
      padding: 30px 20px;
    }

    .topbar{
      max-width: 1450px;
      margin:auto;

      background: rgba(17,24,39,.75);
      backdrop-filter: blur(12px);

      border:1px solid var(--border);
      border-radius: 24px;

      padding: 22px 28px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;

      box-shadow: var(--shadow);
    }

    .brand h1{
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.5px;
    }

    .brand p{
      color: var(--muted);
      margin-top: 5px;
      font-size: .95rem;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    button{
      border:none;
      cursor:pointer;
      transition:.25s ease;
      font-weight:600;
      font-size:.95rem;
    }

    .btn{
      padding: 12px 18px;
      border-radius: 12px;
    }

    .btn-primary{
      background: var(--primary);
      color:white;
    }

    .btn-primary:hover{
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-success{
      background: var(--success);
      color:white;
    }

    .btn-success:hover{
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    main{
      max-width:1450px;
      margin:auto;
      padding: 10px 20px 40px;
    }

    .card{
      background: rgba(17,24,39,.8);
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .section-title{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      margin-bottom:25px;
      flex-wrap:wrap;
    }

    .section-title h2{
      font-size:1.3rem;
    }

    .stats{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .stat{
      background: var(--card-2);
      border:1px solid var(--border);
      padding: 12px 16px;
      border-radius: 14px;
      min-width: 160px;
    }

    .stat small{
      color:var(--muted);
      display:block;
      margin-bottom:5px;
    }

    .stat strong{
      font-size:1.2rem;
    }

    .toolbar{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .input{
      background: #0f172a;
      border:1px solid var(--border);
      color:var(--text);
      border-radius: 12px;
      padding: 13px 14px;
      min-height:48px;
      outline:none;
      transition:.2s;
    }

    .input:focus{
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,.15);
    }

    input[type="file"]{
      flex:1;
      min-width:250px;
    }

    #search-bar{
      flex:1;
      min-width:240px;
    }

    .table-container{
      overflow:auto;
      border-radius: 16px;
      border:1px solid var(--border);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1600px;
      background: rgba(15,23,42,.85);
    }

    thead{
      background: #172554;
    }

    th{
      color:white;
      font-size:.82rem;
      font-weight:600;
      letter-spacing:.3px;
      padding:14px 12px;
      text-align:center;
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid var(--border);
    }

    td{
      padding: 12px 10px;
      text-align:center;
      font-size:.85rem;
      border-bottom:1px solid rgba(255,255,255,.05);
      color:#e2e8f0;
    }

    tbody tr{
      transition:.2s;
    }

    tbody tr:nth-child(even){
      background: rgba(255,255,255,.02);
    }

    tbody tr:hover{
      background: rgba(59,130,246,.08);
    }

    .delete-btn{
      background: rgba(239,68,68,.15);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.2);

      padding: 9px 12px;
      border-radius: 10px;
      font-size:.8rem;
      font-weight:600;
    }

    .delete-btn:hover{
      background: rgba(239,68,68,.25);
      transform: scale(1.03);
    }

    .empty{
      text-align:center;
      padding:50px 20px;
      color:var(--muted);
    }

    footer{
      text-align:center;
      color:var(--muted);
      padding: 25px;
      font-size:.9rem;
    }

    @media(max-width:900px){

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

      .toolbar{
        flex-direction:column;
      }

      .btn{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="topbar">

      <div class="brand">
        <h2>Renova Billing</h2>
        <p>holahola</p>
      </div>

      <div class="actions">
        <button class="btn btn-success" onclick="exportToExcel()">
          Exportar a Excel
        </button>
      </div>

    </div>
  </header>

  <main>

    <div class="card">

      <div class="section-title">

        <h2>Gestión de Facturas</h2>

        <div class="stats">
          <div class="stat">
            <small>Facturas registradas</small>
            <strong id="factura-count">0</strong>
          </div>
        </div>

      </div>

      <form id="upload-form" class="toolbar">

        <input
          class="input"
          type="file"
          id="file-upload"
          accept=".xml,image/*,application/pdf"
        />

        <input
          class="input"
          type="text"
          id="search-bar"
          placeholder="Buscar factura, cliente, RUC..."
        />

        <button type="submit" class="btn btn-primary">
          Subir Factura
        </button>

      </form>

      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>Factura</th>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>RUC</th>
              <th>Ciudad</th>
              <th>Código</th>
              <th>Modelo</th>
              <th>Cantidad</th>
              <th>Costo Unit.</th>
              <th>Total</th>
              <th>IVA</th>
              <th>Total Facturado</th>
              <th>Eliminar</th>
            </tr>
          </thead>

          <tbody id="invoice-table"></tbody>

        </table>

      </div>

    </div>

  </main>

  <footer>
    © 2026 Renova Billing • Sistema Inteligente
  </footer>

  <script>

    let invoices = JSON.parse(localStorage.getItem("invoices")) || [];

    const uploadForm = document.getElementById("upload-form");
    const invoiceTable = document.getElementById("invoice-table");
    const searchBar = document.getElementById("search-bar");

    uploadForm.addEventListener("submit", async (e) => {

      e.preventDefault();

      const file = document.getElementById("file-upload").files[0];

      if(!file){
        return alert("Selecciona un archivo.");
      }

      // XML
      if(file.name.endsWith(".xml")){

        const reader = new FileReader();

        reader.onload = function(){

          const parser = new DOMParser();
          const xml = parser.parseFromString(this.result, "application/xml");

          const cdata = xml.querySelector("comprobante")?.textContent.trim();

          if(cdata){

            const inner = new DOMParser()
            .parseFromString(cdata, "application/xml");

            const invoice = processXMLData(inner);

            invoices.push(...invoice);

            saveAndRender();

          } else {

            alert("XML inválido.");

          }
        };

        reader.readAsText(file);

      } else {

        // OCR

        const { data:{ text } } = await Tesseract.recognize(
          file,
          "spa",
          {
            logger: m => console.log(m)
          }
        );

        const invoice = extractFromText(text);

        invoices.push(invoice);

        saveAndRender();
      }

    });

    function processXMLData(xml){

      const get = (sel) =>
        xml.querySelector(sel)?.textContent.trim() || "N/A";

      const models =
        Array.from(xml.querySelectorAll("detalles > detalle"));

      return models.map(m => ({

        factura: get("infoTributaria > secuencial"),

        fecha: get("infoFactura > fechaEmision"),

        cliente: get("infoFactura > razonSocialComprador"),

        ruc: get("infoFactura > identificacionComprador"),

        ciudad: get("infoFactura > direccionComprador"),

        codigo:
          m.querySelector("codigoPrincipal")
          ?.textContent.trim() || "N/A",

        modelo:
          m.querySelector("descripcion")
          ?.textContent.trim() || "N/A",

        cantidad:
          m.querySelector("cantidad")
          ?.textContent.trim() || "0",

        costo:
          m.querySelector("precioUnitario")
          ?.textContent.trim() || "0",

        total:
          m.querySelector("precioTotalSinImpuesto")
          ?.textContent.trim() || "0",

        iva:
          get("infoFactura > totalConImpuestos > totalImpuesto > valor"),

        total_facturado:
          get("infoFactura > importeTotal")

      }));

    }

    function extractFromText(text){

      const factura =
        text.match(/Factura\s*No[:.\s]*([A-Z0-9\-]+)/i)?.[1]
        || "No detectado";

      const cliente =
        text.match(/Cliente[:.\s]*(.+)/i)?.[1]
        ?.split("\n")[0]
        || "No detectado";

      const ruc =
        text.match(/RUC[:.\s]*(\d{10,13})/i)?.[1]
        || "No detectado";

      const fecha =
        text.match(/Fecha[:.\s]*(\d{2}\/\d{2}\/\d{4})/i)?.[1]
        || "No detectado";

      const total =
        text.match(/Total[:.\s]*\$?\s*([\d.,]+)/i)?.[1]
        || "0";

      return {

        factura,
        fecha,
        cliente,
        ruc,
        ciudad: "OCR",
        codigo: "-",
        modelo: "Detectado por imagen",
        cantidad: "1",
        costo: total,
        total: total,
        iva: "-",
        total_facturado: total

      };

    }

    function saveAndRender(){

      localStorage.setItem(
        "invoices",
        JSON.stringify(invoices)
      );

      populateTable();
      updateFacturaCount();

    }

    function populateTable(filtered = invoices){

      invoiceTable.innerHTML = "";

      if(filtered.length === 0){

        invoiceTable.innerHTML = `
          <tr>
            <td colspan="13" class="empty">
              No hay facturas registradas
            </td>
          </tr>
        `;

        return;
      }

      filtered.forEach((inv, index) => {

        const row = document.createElement("tr");

        row.innerHTML = `

          <td>${inv.factura}</td>
          <td>${inv.fecha}</td>
          <td>${inv.cliente}</td>
          <td>${inv.ruc}</td>
          <td>${inv.ciudad}</td>
          <td>${inv.codigo}</td>
          <td>${inv.modelo}</td>
          <td>${inv.cantidad}</td>
          <td>$${inv.costo}</td>
          <td>$${inv.total}</td>
          <td>$${inv.iva}</td>
          <td>$${inv.total_facturado}</td>

          <td>
            <button class="delete-btn" onclick="deleteInvoice(${index})">
              Eliminar
            </button>
          </td>
        `;

        invoiceTable.appendChild(row);

      });

    }

    function deleteInvoice(index){

      invoices.splice(index, 1);

      saveAndRender();

    }

    function updateFacturaCount(){

      document.getElementById("factura-count")
      .textContent = invoices.length;

    }

    function exportToExcel(){

      const ws = XLSX.utils.json_to_sheet(invoices);

      const wb = XLSX.utils.book_new();

      XLSX.utils.book_append_sheet(
        wb,
        ws,
        "Facturas"
      );

      XLSX.writeFile(
        wb,
        "facturas.xlsx"
      );

    }

    searchBar.addEventListener("input", () => {

      const value = searchBar.value.toLowerCase();

      const filtered = invoices.filter(inv =>

        Object.values(inv)
        .join(" ")
        .toLowerCase()
        .includes(value)

      );

      populateTable(filtered);

    });

    document.addEventListener("DOMContentLoaded", () => {

      populateTable();
      updateFacturaCount();

    });

  </script>

</body>
</html>
