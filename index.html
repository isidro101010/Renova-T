<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Facturación Inteligente</title>

  <!-- Fuente -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Librerías -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <style>
    :root{
      --bg:#0b1220;
      --surface:#0f1724;
      --muted:#9aa8bf;
      --text:#e6eef8;
      --accent:#2563eb;
      --accent-2:#06b6d4;
      --success:#16a34a;
      --danger:#ef4444;
      --glass: rgba(255,255,255,0.03);
      --radius:12px;
      --shadow: 0 6px 22px rgba(2,6,23,0.6);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background: linear-gradient(180deg,#071024 0%, #071026 60%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      padding:28px;
    }

    .container{max-width:1200px;margin:0 auto}

    header{
      display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;
    }

    .brand{display:flex;gap:12px;align-items:center}
    .logo{
      width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:20px;box-shadow:var(--shadow)
    }

    .brand h1{font-size:1.25rem;letter-spacing:-0.3px}
    .brand p{color:var(--muted);font-size:0.85rem}

    .controls{display:flex;gap:10px;align-items:center}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:10px 14px;border-radius:10px;color:var(--text);cursor:pointer;font-weight:600}
    .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));border:none;color:white}

    /* Card */
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:14px;padding:18px;border:1px solid rgba(255,255,255,0.04);box-shadow:var(--shadow)}

    .top-area{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:16px}

    .upload-area{flex:1;padding:16px;border-radius:12px;border:1px dashed rgba(255,255,255,0.04);background:var(--glass);display:flex;gap:12px;align-items:center}
    .upload-area.dragover{border-color:rgba(37,99,235,0.9);box-shadow:0 8px 30px rgba(37,99,235,0.08);}

    .upload-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center}
    .upload-text{color:var(--muted);font-size:0.95rem}
    input[type=file]{display:none}

    .search{min-width:260px}
    .search input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--text)}

    .meta{display:flex;gap:12px;align-items:center}
    .count{background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:10px;color:var(--muted);font-weight:600}

    .table-wrap{margin-top:14px;overflow:auto;border-radius:10px}
    table{width:100%;border-collapse:collapse;min-width:1200px}
    thead th{background:rgba(255,255,255,0.03);text-align:left;padding:12px 14px;position:sticky;top:0}
    tbody td{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.02);color:var(--text)}
    tbody tr:hover{background:rgba(37,99,235,0.04)}

    .badge{display:inline-block;padding:6px 10px;border-radius:8px;font-weight:700;font-size:0.78rem}
    .badge.type-xml{background:rgba(96,165,250,0.12);color:#bfdbfe}
    .badge.type-ocr{background:rgba(250,204,21,0.08);color:#fef08a}

    .small{font-size:0.85rem;color:var(--muted)}

    .actions{display:flex;gap:8px;align-items:center}
    .delete{background:transparent;border:1px solid rgba(239,68,68,0.16);color:var(--danger);padding:8px 10px;border-radius:8px;cursor:pointer}

    footer{margin-top:18px;color:var(--muted);text-align:center;font-size:0.9rem}

    @media(max-width:900px){
      header{flex-direction:column;align-items:flex-start}
      .top-area{flex-direction:column;align-items:stretch}
      .search{width:100%}
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="brand">
        <div class="logo">RF</div>
        <div>
          <h1>Sistema de Facturación Inteligente</h1>
          <p>Organiza y exporta tus facturas rápidamente</p>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="helpBtn" title="Atajos y ayuda">Ayuda</button>
        <button class="btn primary" id="exportBtn">Exportar Excel</button>
      </div>
    </header>

    <main class="card">

      <div class="top-area">

        <label class="upload-area" id="uploadArea" tabindex="0">
          <div class="upload-icon">📤</div>
          <div>
            <div class="upload-text">Arrastra y suelta archivos XML o imágenes aquí, o haz clic para seleccionar (múltiple)</div>
            <input type="file" id="fileUpload" accept=".xml,image/*" multiple aria-label="Subir facturas" />
          </div>
        </label>

        <div style="display:flex;gap:12px;align-items:center">
          <div class="search">
            <input type="search" id="search" placeholder="Buscar cliente, factura, RUC..." aria-label="Buscar" />
          </div>

          <div class="meta">
            <div class="count" id="invoiceCount">Facturas leídas: 0</div>
          </div>
        </div>

      </div>

      <div class="table-wrap">
        <table aria-label="Listado de facturas">
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Factura</th>
              <th>Fecha</th>
              <th>Cliente</th>
              <th>RUC</th>
              <th>Modelo / Descripción</th>
              <th>Cantidad</th>
              <th>Precio Unit.</th>
              <th>Precio Total</th>
              <th>Total Facturado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="invoiceTable"></tbody>
        </table>
      </div>

    </main>

    <footer>Hecho con ♥ — Sistema de Facturación Inteligente</footer>

  </div>

  <script>
    // Remove PDF-related code entirely. This script focuses on XML and OCR (images).

    let invoices = JSON.parse(localStorage.getItem('invoices')) || [];

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileUpload');
    const invoiceTable = document.getElementById('invoiceTable');
    const invoiceCount = document.getElementById('invoiceCount');
    const searchInput = document.getElementById('search');
    const exportBtn = document.getElementById('exportBtn');

    // UX: show dragover state
    ['dragenter','dragover'].forEach(evt=>{
      uploadArea.addEventListener(evt,e=>{e.preventDefault();e.stopPropagation();uploadArea.classList.add('dragover')});
    });
    ['dragleave','drop'].forEach(evt=>{
      uploadArea.addEventListener(evt,e=>{e.preventDefault();e.stopPropagation();uploadArea.classList.remove('dragover')});
    });

    uploadArea.addEventListener('click',()=>fileInput.click());
    uploadArea.addEventListener('drop',handleDrop);
    fileInput.addEventListener('change',handleFiles);

    searchInput.addEventListener('input',()=>renderTable(filterInvoices(searchInput.value)));
    exportBtn.addEventListener('click',exportToExcel);

    // Keyboard shortcut: Ctrl/Cmd+E export
    window.addEventListener('keydown',(e)=>{
      if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='e'){
        e.preventDefault();exportToExcel();
      }
    });

    function handleDrop(e){
      const dt = e.dataTransfer; if(!dt) return;
      const items = Array.from(dt.files);
      processFiles(items);
    }

    function handleFiles(e){
      const items = Array.from((e.target || {}).files || []);
      processFiles(items);
      fileInput.value = '';
    }

    async function processFiles(files){
      if(!files || files.length === 0) return;
      showTemporaryMessage('Procesando archivos...');

      for(const file of files){
        try{
          if(file.name.toLowerCase().endsWith('.xml')){
            const text = await file.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, 'application/xml');

            // If wrapped in <comprobante> CDATA
            const cdata = xml.querySelector('comprobante')?.textContent?.trim();
            const inner = cdata ? new DOMParser().parseFromString(cdata,'application/xml') : xml;
            const rows = processXMLData(inner);
            invoices.push(...rows);
          } else if(file.type.startsWith('image/') || /\.(png|jpe?g|bmp|tiff)$/i.test(file.name)){
            // OCR
            const { data: { text } } = await Tesseract.recognize(file,'spa',{logger: m => {/*silence*/}});
            const row = extractFromText(text);
            invoices.push(row);
          } else {
            console.warn('Tipo de archivo no soportado:', file.name);
          }
        } catch(err){
          console.error('Error procesando', file.name, err);
        }
      }

      saveAndRender();
      hideTemporaryMessage();
    }

    function processXMLData(xml){
      const get = (sel)=> xml.querySelector(sel)?.textContent?.trim() || 'N/A';

      const detalles = Array.from(xml.querySelectorAll('detalles > detalle'));
      if(detalles.length === 0){
        // Try legacy selector
        detalles.push(xml.querySelector('detalle'));
      }

      return detalles.map(m => ({
        tipo: 'XML',
        factura: get('infoTributaria > secuencial'),
        fecha: get('infoFactura > fechaEmision'),
        cliente: get('infoFactura > razonSocialComprador'),
        ruc: get('infoFactura > identificacionComprador'),
        modelo: m?.querySelector('descripcion')?.textContent?.trim() || 'N/A',
        cantidad: m?.querySelector('cantidad')?.textContent?.trim() || '1',
        precio_unitario: m?.querySelector('precioUnitario')?.textContent?.trim() || '0',
        precio_total: m?.querySelector('precioTotalSinImpuesto')?.textContent?.trim() || '0',
        total_facturado: get('infoFactura > importeTotal')
      }));
    }

    // Simple OCR text extractor fallback
    function extractFromText(text){
      const factura = text.match(/\d{3}-\d{3}-\d+/)?.[0] || 'N/A';
      const fecha = text.match(/Fecha[:\s]*([0-9]{2}\/?[0-9]{2}\/?[0-9]{2,4})/i)?.[1] || 'N/A';
      const ruc = text.match(/(R\.?U\.?C\.?[:\s]*\d{9,13})/i)?.[0] || 'N/A';
      const cliente = text.match(/(Raz[oó]n Social[:\s]*[^\n]+)/i)?.[1] || text.split('\n')[0] || 'N/A';

      // Try to find last numeric amount as total
      const amounts = Array.from(text.matchAll(/([0-9]{1,3}(?:[\.,][0-9]{3})*(?:[\.,][0-9]{2}))/g)).map(m=>m[1]);
      const total = amounts.length ? amounts[amounts.length-1] : '0';

      return {
        tipo: 'OCR',
        factura,
        fecha,
        cliente,
        ruc,
        modelo: 'Producto detectado por OCR',
        cantidad: '1',
        precio_unitario: total,
        precio_total: total,
        total_facturado: total
      };
    }

    function saveAndRender(){
      localStorage.setItem('invoices', JSON.stringify(invoices));
      renderTable(invoices);
      updateCount();
    }

    function updateCount(){
      invoiceCount.textContent = `Facturas leídas: ${invoices.length}`;
    }

    function renderTable(data){
      invoiceTable.innerHTML = '';
      const fragment = document.createDocumentFragment();

      data.forEach((inv, idx) => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td><span class="badge ${inv.tipo === 'XML' ? 'type-xml' : 'type-ocr'}">${inv.tipo}</span></td>
          <td class="small">${escapeHtml(inv.factura || 'N/A')}</td>
          <td>${escapeHtml(inv.fecha || 'N/A')}</td>
          <td>${escapeHtml(inv.cliente || 'N/A')}</td>
          <td>${escapeHtml(inv.ruc || 'N/A')}</td>
          <td>${escapeHtml(inv.modelo || '')}</td>
          <td>${escapeHtml(inv.cantidad || '')}</td>
          <td>${escapeHtml(inv.precio_unitario || '')}</td>
          <td>${escapeHtml(inv.precio_total || '')}</td>
          <td>${escapeHtml(inv.total_facturado || '')}</td>
          <td class="actions">
            <button class="btn" data-idx="${idx}" onclick="copyRow(${idx})" title="Copiar fila">Copiar</button>
            <button class="delete" data-idx="${idx}" onclick="deleteRow(${idx})" title="Eliminar">Eliminar</button>
          </td>
        `;

        fragment.appendChild(tr);
      });

      invoiceTable.appendChild(fragment);
    }

    function filterInvoices(q){
      if(!q) return invoices;
      q = q.toLowerCase();
      return invoices.filter(i => {
        return (i.cliente || '').toLowerCase().includes(q) ||
               (i.factura || '').toLowerCase().includes(q) ||
               (i.ruc || '').toLowerCase().includes(q) ||
               (i.modelo || '').toLowerCase().includes(q);
      });
    }

    // Utilities
    function escapeHtml(str){
      if(!str) return '';
      return String(str).replace(/[&<>\"']/g, function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]});
    }

    function deleteRow(idx){
      if(!confirm('Eliminar esta entrada?')) return;
      invoices.splice(idx,1);
      saveAndRender();
    }

    function copyRow(idx){
      const row = invoices[idx];
      const text = Object.entries(row).map(([k,v])=>`${k}: ${v}`).join('\n');
      navigator.clipboard?.writeText(text).then(()=>{
        showTemporaryMessage('Fila copiada al portapapeles');
      }).catch(()=>{
        alert('No se pudo copiar');
      });
    }

    function exportToExcel(){
      if(!invoices.length){alert('No hay facturas para exportar');return}
      const ws_data = [Object.keys(invoices[0])];
      invoices.forEach(r => ws_data.push(Object.values(r)));
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      XLSX.utils.book_append_sheet(wb, ws, 'Facturas');
      XLSX.writeFile(wb, 'facturas.xlsx');
    }

    // Small transient message area
    let tempTimer;
    function showTemporaryMessage(msg, time=2000){
      clearTimeout(tempTimer);
      let el = document.getElementById('tempMsg');
      if(!el){ el = document.createElement('div'); el.id='tempMsg'; el.style.position='fixed'; el.style.right='20px'; el.style.bottom='20px'; el.style.background='rgba(0,0,0,0.6)'; el.style.color='white'; el.style.padding='10px 14px'; el.style.borderRadius='10px'; document.body.appendChild(el); }
      el.textContent = msg;
      el.style.display='block';
      tempTimer = setTimeout(()=>{ el.style.display='none'; }, time);
    }
    function hideTemporaryMessage(){
      const el = document.getElementById('tempMsg'); if(el) el.style.display='none';
    }

    // Initial render
    renderTable(invoices);
    updateCount();

    // Help button
    document.getElementById('helpBtn').addEventListener('click', ()=>{
      alert('Atajos:\n- Ctrl/Cmd+E: Exportar a Excel\nCaracterísticas:\n- Arrastra y suelta archivos XML o imágenes.\n- Búsqueda en vivo.\n- Copiar o eliminar filas.');
    });

  </script>
</body>
</html>
